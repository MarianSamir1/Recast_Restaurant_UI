name: recast_restaurant_ui
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  #ios style icons
  cupertino_icons: ^1.0.8
  #dependency injection
  get_it: ^9.2.0
  #state management
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  # for comparing objects in bloc states
  equatable: ^2.0.7
  #for adapting screen and font size
  flutter_screenutil: ^5.9.3
  #for image helper methods (Svg, network image, etc)
  gif_view: ^1.0.3
  lottie: ^3.3.2
  cached_network_image: ^3.4.1
  flutter_svg: ^2.2.3
  #Provides a collection of Flutter grids layouts (staggered, masonry, quilted, woven, etc.).
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # for custom fonts
  fonts:
    - family: Satoshi
      fonts:
        - asset: assets/fonts/Satoshi-Regular.ttf
          weight: 400
        - asset: assets/fonts/Satoshi-Medium.ttf
          weight: 500
        - asset: assets/fonts/Satoshi-Bold.ttf
          weight: 700

